name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_only:
        description: 'Re-run the deploy job (skip build/e2e)'
        type: boolean
        default: false

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.deploy_only }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      # --- Parity invariant ---
      # server/src/lib/points.js and client/src/lib/points.js must be byte-identical.
      # See docs/db-speed.md → Phase 4 "Decisions locked in".
      - name: Check points.js parity
        run: make check-points-parity

      # --- Server ---
      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Create data directory
        working-directory: server
        run: mkdir -p data

      - name: Run migrations
        working-directory: server
        env:
          NODE_ENV: test
        run: npx knex migrate:latest --knexfile src/db/knexfile.cjs

      - name: Run seeds
        working-directory: server
        env:
          NODE_ENV: test
        run: npx knex seed:run --knexfile src/db/knexfile.cjs

      - name: Run server tests
        working-directory: server
        env:
          NODE_ENV: test
        run: npm test

      # --- Client ---
      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Run client unit tests (points parity mirror)
        working-directory: client
        run: npx vitest run

      - name: Build client
        working-directory: client
        run: npm run build

      # --- Smoke test ---
      - name: Verify client build output exists
        run: |
          test -f client/dist/index.html
          echo "Client build OK — index.html exists"

      - name: Verify API health endpoint
        working-directory: server
        env:
          NODE_ENV: test
          PORT: 3001
        run: |
          node src/index.js &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:3001/api/health | grep -q '"status":"ok"'
          echo "Server health check OK"
          kill $SERVER_PID

  e2e:
    name: End-to-end (prod-build stack)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.deploy_only }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Log pinned versions
        run: |
          echo "node: $(node --version)"
          echo "docker: $(docker --version)"
          echo "compose: $(docker compose version)"

      - name: Resolve short git SHA for APP_SCHEMA_VERSION
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log pinned image digests before build
        run: |
          docker pull ghcr.io/tursodatabase/libsql-server:v0.24.32
          docker pull nginx:1.27-alpine
          docker pull node:24-alpine
          docker image inspect --format '{{.RepoDigests}}' ghcr.io/tursodatabase/libsql-server:v0.24.32
          docker image inspect --format '{{.RepoDigests}}' nginx:1.27-alpine
          docker image inspect --format '{{.RepoDigests}}' node:24-alpine

      - name: Run E2E suite
        env:
          APP_SCHEMA_VERSION: ${{ steps.sha.outputs.short }}
        # Single entry point; Makefile is the source of truth for every environment.
        run: make e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: e2e-report
          retention-days: 14
          if-no-files-found: ignore

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [build-and-test, e2e]
    # Run on push to main after tests, OR on manual workflow_dispatch. When
    # dispatched with deploy_only=true the build/e2e jobs are skipped (their
    # `if` evaluates to false) — `needs` with a skipped dependency still
    # propagates, so we use `always()` to run regardless, then explicitly
    # guard against the case where tests actually failed.
    if: |
      always() && !cancelled() &&
      (needs.build-and-test.result == 'success' || needs.build-and-test.result == 'skipped') &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') &&
      ((github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch')
    environment: production

    steps:
      - name: Deploy & monitor
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_API_SERVICE_ID: ${{ secrets.RENDER_API_SERVICE_ID }}
          RENDER_WEB_SERVICE_ID: ${{ secrets.RENDER_WEB_SERVICE_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -uo pipefail

          if [ -z "$RENDER_API_KEY" ]; then
            echo "::warning::No RENDER_API_KEY configured — skipping deploy."
            echo "Add RENDER_API_KEY, RENDER_API_SERVICE_ID, and RENDER_WEB_SERVICE_ID secrets to enable auto-deploy."
            echo "See docs/deployment.md for setup instructions."
            exit 0
          fi

          RENDER_API="https://api.render.com/v1"
          AUTH="Authorization: Bearer ${RENDER_API_KEY}"

          # Sync a single env var onto a Render service. Uses the per-key PUT
          # endpoint so other env vars (TURSO_*, NODE_ENV, PORT, …) are
          # untouched. Creates the var if missing, updates in place otherwise.
          # Usage: sync_env_var <service_id> <label> <key> <value>
          sync_env_var() {
            local SVC_ID="$1"
            local LABEL="$2"
            local KEY="$3"
            local VALUE="$4"

            if [ -z "$SVC_ID" ] || [ -z "$VALUE" ]; then
              return 0
            fi

            # Body built via jq so special chars in the secret are escaped correctly.
            local BODY
            BODY=$(jq -cn --arg v "$VALUE" '{value:$v}')

            local HTTP_CODE
            HTTP_CODE=$(curl -s -o /tmp/render_env_out -w '%{http_code}' \
              -X PUT "${RENDER_API}/services/${SVC_ID}/env-vars/${KEY}" \
              -H "${AUTH}" \
              -H "Content-Type: application/json" \
              -d "$BODY")

            case "$HTTP_CODE" in
              200|201)
                echo "Synced ${KEY} to ${LABEL} (HTTP ${HTTP_CODE})."
                ;;
              *)
                echo "::error::Failed to sync ${KEY} to ${LABEL} (HTTP ${HTTP_CODE})"
                cat /tmp/render_env_out 2>/dev/null || true
                echo
                return 1
                ;;
            esac
          }

          # JWT_SECRET is the source of truth in GitHub secrets. We push it to
          # Render before triggering the deploy so a restarted service boots
          # with the current value — server/src/lib/auth.js throws at require
          # time without it in production, so this must not be skipped silently.
          if [ -z "$JWT_SECRET" ]; then
            echo "::error::JWT_SECRET is not set in GitHub secrets."
            echo "Add it to the 'production' environment at:"
            echo "  https://github.com/chezer1234/Traveleria/settings/environments"
            exit 1
          fi
          sync_env_var "$RENDER_API_SERVICE_ID" "API" "JWT_SECRET" "$JWT_SECRET"

          # APP_SCHEMA_VERSION is derived from the commit SHA — no GitHub
          # secret needed because it's not sensitive. Every push to main
          # produces a new SHA → the server stamps X-App-Schema-Version with
          # it → clients on the old bundle detect the mismatch and wipe+
          # resnapshot. The web service's bundle bakes VITE_APP_SCHEMA_VERSION
          # at build time (Vite reads it from env during `npm run build`), so
          # we set both and Render's subsequent rebuild captures it.
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "Stamping deploy with APP_SCHEMA_VERSION=${SHORT_SHA}"
          sync_env_var "$RENDER_API_SERVICE_ID" "API" "APP_SCHEMA_VERSION" "$SHORT_SHA"
          sync_env_var "$RENDER_WEB_SERVICE_ID" "Web" "VITE_APP_SCHEMA_VERSION" "$SHORT_SHA"

          # Pin Render's runtime Node to match what CI tests against. Both
          # package.json files carry `engines.node: ">=24"`, but Render only
          # honours that if it can resolve a Node binary at or above that
          # version — default runners are still on older majors. NODE_VERSION
          # is Render's canonical knob for overriding the default toolchain.
          NODE_VERSION="24"
          sync_env_var "$RENDER_API_SERVICE_ID" "API" "NODE_VERSION" "$NODE_VERSION"
          sync_env_var "$RENDER_WEB_SERVICE_ID" "Web" "NODE_VERSION" "$NODE_VERSION"

          # Fetch and print recent service logs from Render
          # Usage: fetch_logs <service_id> <label> [deploy_id]
          fetch_logs() {
            local SVC_ID="$1"
            local LABEL="$2"
            local DEPLOY_ID="${3:-}"

            echo ""
            echo "========================================="
            echo " ${LABEL} — Render Deploy + Service Logs"
            echo "========================================="

            # 1. Get recent deploys to show status history
            echo "--- Recent deploys ---"
            DEPLOYS=$(curl -s "${RENDER_API}/services/${SVC_ID}/deploys?limit=3" \
              -H "${AUTH}" 2>/dev/null || echo "[]")
            echo "$DEPLOYS" | jq -r '.[]? | "\(.id) \(.status) \(.createdAt // "")"' 2>/dev/null || echo "$DEPLOYS"

            # 2. Get the specific deploy details if we have an ID
            if [ -n "$DEPLOY_ID" ]; then
              echo ""
              echo "--- Deploy ${DEPLOY_ID} details ---"
              DEPLOY_DETAIL=$(curl -s "${RENDER_API}/services/${SVC_ID}/deploys/${DEPLOY_ID}" \
                -H "${AUTH}" 2>/dev/null || echo "{}")
              echo "$DEPLOY_DETAIL" | jq '{status, createdAt, updatedAt, finishedAt, trigger}' 2>/dev/null || echo "$DEPLOY_DETAIL"
            fi

            # 3. Get service events (includes start/stop/crash info)
            echo ""
            echo "--- Service events ---"
            EVENTS=$(curl -s "${RENDER_API}/services/${SVC_ID}/events?limit=15" \
              -H "${AUTH}" 2>/dev/null || echo "[]")
            echo "$EVENTS" | jq -r '.[]? | .event? // . | "\(.timestamp // .createdAt // "") \(.type // .reason // "event") \(.details // .message // "")"' 2>/dev/null || echo "$EVENTS"

            # 4. Get actual container stdout/stderr. The events above just say
            # "nonZeroExit: 1" — useless for diagnosing WHY the process died.
            # Query /v1/logs with resource=<serviceId>, limit=100, no start/
            # end so the default 1h window covers the recent deploy.
            echo ""
            echo "--- Service logs (container stdout/stderr) ---"
            OWNER_ID=$(curl -s "${RENDER_API}/services/${SVC_ID}" -H "${AUTH}" 2>/dev/null \
              | jq -r '.ownerId // empty' 2>/dev/null)
            if [ -n "$OWNER_ID" ]; then
              LOGS=$(curl -sG "${RENDER_API}/logs" \
                -H "${AUTH}" \
                --data-urlencode "ownerId=${OWNER_ID}" \
                --data-urlencode "resource=${SVC_ID}" \
                --data-urlencode "limit=100" \
                --data-urlencode "direction=backward" 2>/dev/null || echo '{}')
              echo "$LOGS" | jq -r '.logs[]? | "\(.timestamp) \(.message)"' 2>/dev/null \
                || echo "(no logs parsed; raw response below)"
              echo "$LOGS" | head -c 500
            else
              echo "(could not resolve ownerId for ${SVC_ID} — skipping log fetch)"
            fi

            echo "========================================="
          }

          # Trigger a deploy, poll until it finishes, then fetch logs
          # Usage: deploy_service <service_id> <label>
          deploy_service() {
            local SVC_ID="$1"
            local LABEL="$2"

            if [ -z "$SVC_ID" ]; then
              echo "::warning::No service ID for ${LABEL} — skipping."
              return 0
            fi

            echo ""
            echo "--- ${LABEL} ---"
            echo "Triggering deploy for ${LABEL}..."

            # Trigger deploy
            RESPONSE=$(curl -s -X POST "${RENDER_API}/services/${SVC_ID}/deploys" \
              -H "${AUTH}" \
              -H "Content-Type: application/json" \
              -d '{}')

            DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
            if [ -z "$DEPLOY_ID" ]; then
              echo "::error::Failed to trigger deploy for ${LABEL}"
              echo "Response: ${RESPONSE}"
              fetch_logs "$SVC_ID" "$LABEL"
              return 1
            fi

            echo "Deploy triggered: ${DEPLOY_ID}"

            # Poll for status (max 5 minutes)
            local ELAPSED=0
            local MAX_WAIT=300
            local INTERVAL=15

            while [ $ELAPSED -lt $MAX_WAIT ]; do
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))

              STATUS_RESPONSE=$(curl -s "${RENDER_API}/services/${SVC_ID}/deploys/${DEPLOY_ID}" \
                -H "${AUTH}")
              STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status // "unknown"')

              echo "[${ELAPSED}s] ${LABEL}: ${STATUS}"

              case "$STATUS" in
                live)
                  echo "${LABEL} deployed successfully!"
                  fetch_logs "$SVC_ID" "$LABEL" "$DEPLOY_ID"
                  return 0
                  ;;
                deactivated|canceled|build_failed|update_failed)
                  echo "::error::${LABEL} deploy failed with status: ${STATUS}"
                  fetch_logs "$SVC_ID" "$LABEL" "$DEPLOY_ID"
                  return 1
                  ;;
                created|build_in_progress|update_in_progress)
                  # Still going, keep polling
                  ;;
                *)
                  echo "Unexpected status: ${STATUS} — continuing to poll..."
                  ;;
              esac
            done

            echo "::warning::${LABEL} deploy still running after ${MAX_WAIT}s"
            fetch_logs "$SVC_ID" "$LABEL" "$DEPLOY_ID"
            return 0
          }

          # Deploy API first, then Web
          deploy_service "$RENDER_API_SERVICE_ID" "API"
          API_RESULT=$?

          deploy_service "$RENDER_WEB_SERVICE_ID" "Web"
          WEB_RESULT=$?

          if [ $API_RESULT -ne 0 ] || [ $WEB_RESULT -ne 0 ]; then
            echo ""
            echo "::error::One or more deploys failed. Check the logs above."
            exit 1
          fi

          echo ""
          echo "All deploys completed successfully!"

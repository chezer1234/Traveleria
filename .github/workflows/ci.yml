name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      # --- Server ---
      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Create data directory
        working-directory: server
        run: mkdir -p data

      - name: Run migrations
        working-directory: server
        env:
          NODE_ENV: test
        run: npx knex migrate:latest --knexfile src/db/knexfile.js

      - name: Run seeds
        working-directory: server
        env:
          NODE_ENV: test
        run: npx knex seed:run --knexfile src/db/knexfile.js

      - name: Run server tests
        working-directory: server
        env:
          NODE_ENV: test
        run: npm test

      # --- Client ---
      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build

      # --- Smoke test ---
      - name: Verify client build output exists
        run: |
          test -f client/dist/index.html
          echo "Client build OK — index.html exists"

      - name: Verify API health endpoint
        working-directory: server
        env:
          NODE_ENV: test
          PORT: 3000
        run: |
          node src/index.js &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:3000/api/health | grep -q '"status":"ok"'
          echo "Server health check OK"
          kill $SERVER_PID

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy & monitor
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_API_SERVICE_ID: ${{ secrets.RENDER_API_SERVICE_ID }}
          RENDER_WEB_SERVICE_ID: ${{ secrets.RENDER_WEB_SERVICE_ID }}
        run: |
          set -uo pipefail

          if [ -z "$RENDER_API_KEY" ]; then
            echo "::warning::No RENDER_API_KEY configured — skipping deploy."
            echo "Add RENDER_API_KEY, RENDER_API_SERVICE_ID, and RENDER_WEB_SERVICE_ID secrets to enable auto-deploy."
            echo "See docs/deployment.md for setup instructions."
            exit 0
          fi

          RENDER_API="https://api.render.com/v1"
          AUTH="Authorization: Bearer ${RENDER_API_KEY}"

          # Fetch and print recent service logs from Render
          # Usage: fetch_logs <service_id> <label>
          fetch_logs() {
            local SVC_ID="$1"
            local LABEL="$2"
            local END_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            local START_TIME=$(date -u -d "5 minutes ago" +"%Y-%m-%dT%H:%M:%SZ" 2>/dev/null \
              || date -u -v-5M +"%Y-%m-%dT%H:%M:%SZ" 2>/dev/null \
              || echo "")

            echo ""
            echo "========================================="
            echo " ${LABEL} — Render Logs"
            echo "========================================="

            local URL="${RENDER_API}/logs?serviceId=${SVC_ID}&limit=100"
            if [ -n "$START_TIME" ]; then
              URL="${URL}&startTime=${START_TIME}&endTime=${END_TIME}"
            fi

            LOGS=$(curl -s "${URL}" -H "${AUTH}" 2>/dev/null || echo "")

            if [ -z "$LOGS" ]; then
              echo "(no response from logs API)"
            else
              # Try to parse as JSON array of log entries
              PARSED=$(echo "$LOGS" | jq -r '.logs[]? | "\(.timestamp) [\(.level // "info")] \(.message)"' 2>/dev/null)
              if [ -n "$PARSED" ]; then
                echo "$PARSED"
              else
                # Fall back to raw output
                echo "$LOGS" | jq '.' 2>/dev/null || echo "$LOGS"
              fi
            fi
            echo "========================================="
          }

          # Trigger a deploy, poll until it finishes, then fetch logs
          # Usage: deploy_service <service_id> <label>
          deploy_service() {
            local SVC_ID="$1"
            local LABEL="$2"

            if [ -z "$SVC_ID" ]; then
              echo "::warning::No service ID for ${LABEL} — skipping."
              return 0
            fi

            echo ""
            echo "--- ${LABEL} ---"
            echo "Triggering deploy for ${LABEL}..."

            # Trigger deploy
            RESPONSE=$(curl -s -X POST "${RENDER_API}/services/${SVC_ID}/deploys" \
              -H "${AUTH}" \
              -H "Content-Type: application/json" \
              -d '{}')

            DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
            if [ -z "$DEPLOY_ID" ]; then
              echo "::error::Failed to trigger deploy for ${LABEL}"
              echo "Response: ${RESPONSE}"
              fetch_logs "$SVC_ID" "$LABEL"
              return 1
            fi

            echo "Deploy triggered: ${DEPLOY_ID}"

            # Poll for status (max 5 minutes)
            local ELAPSED=0
            local MAX_WAIT=300
            local INTERVAL=15

            while [ $ELAPSED -lt $MAX_WAIT ]; do
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))

              STATUS_RESPONSE=$(curl -s "${RENDER_API}/services/${SVC_ID}/deploys/${DEPLOY_ID}" \
                -H "${AUTH}")
              STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status // "unknown"')

              echo "[${ELAPSED}s] ${LABEL}: ${STATUS}"

              case "$STATUS" in
                live)
                  echo "${LABEL} deployed successfully!"
                  fetch_logs "$SVC_ID" "$LABEL"
                  return 0
                  ;;
                deactivated|canceled|build_failed|update_failed)
                  echo "::error::${LABEL} deploy failed with status: ${STATUS}"
                  fetch_logs "$SVC_ID" "$LABEL"
                  return 1
                  ;;
                created|build_in_progress|update_in_progress)
                  # Still going, keep polling
                  ;;
                *)
                  echo "Unexpected status: ${STATUS} — continuing to poll..."
                  ;;
              esac
            done

            echo "::warning::${LABEL} deploy still running after ${MAX_WAIT}s"
            fetch_logs "$SVC_ID" "$LABEL"
            return 0
          }

          # Deploy API first, then Web
          deploy_service "$RENDER_API_SERVICE_ID" "API"
          API_RESULT=$?

          deploy_service "$RENDER_WEB_SERVICE_ID" "Web"
          WEB_RESULT=$?

          if [ $API_RESULT -ne 0 ] || [ $WEB_RESULT -ne 0 ]; then
            echo ""
            echo "::error::One or more deploys failed. Check the logs above."
            exit 1
          fi

          echo ""
          echo "All deploys completed successfully!"

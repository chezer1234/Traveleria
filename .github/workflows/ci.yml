name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      # --- Server ---
      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Create data directory
        working-directory: server
        run: mkdir -p data

      - name: Run migrations
        working-directory: server
        env:
          NODE_ENV: test
        run: npx knex migrate:latest --knexfile src/db/knexfile.js

      - name: Run seeds
        working-directory: server
        env:
          NODE_ENV: test
        run: npx knex seed:run --knexfile src/db/knexfile.js

      - name: Run server tests
        working-directory: server
        env:
          NODE_ENV: test
        run: npm test

      # --- Client ---
      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build

      # --- Smoke test ---
      - name: Verify client build output exists
        run: |
          test -f client/dist/index.html
          echo "Client build OK — index.html exists"

      - name: Verify API health endpoint
        working-directory: server
        env:
          NODE_ENV: test
          PORT: 3000
        run: |
          node src/index.js &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:3000/api/health | grep -q '"status":"ok"'
          echo "Server health check OK"
          kill $SERVER_PID

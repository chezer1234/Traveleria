# Overlay that swaps dev Dockerfile targets for their prod equivalents.
# Client is served as a static nginx bundle. Server runs without --watch.
# APP_SCHEMA_VERSION is baked into both images at build time; set it in CI to $(git rev-parse --short HEAD).

services:
  server:
    build:
      context: ./server
      target: prod
      args:
        APP_SCHEMA_VERSION: ${APP_SCHEMA_VERSION:-dev}
    environment:
      NODE_ENV: production
      PORT: 3001
      # E2E-only fallback. Real production (Render) must inject a real secret.
      JWT_SECRET: ${JWT_SECRET:-ephemeral-e2e-secret-never-use-in-prod}
      # The E2E stack talks plain http inside the compose network. Prod (Render) is
      # HTTPS-terminated upstream — override with COOKIE_SECURE=true there.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}

  client:
    build:
      context: ./client
      target: prod
      args:
        VITE_APP_SCHEMA_VERSION: ${APP_SCHEMA_VERSION:-dev}
        # Compose-internal hostname so the Playwright container's Chromium can
        # reach the API from the loaded client bundle. Matches prod topology
        # (split client + API origins) — Render prod overrides with the real
        # public API URL.
        VITE_API_URL: http://server:3001

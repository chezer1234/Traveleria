# Overlay that adds a Playwright runner. Usually combined with compose.prod-build.yaml
# so E2E exercises the actual shipped bundle, not the Vite dev server.

services:
  e2e:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    depends_on:
      - client
      - server
    environment:
      BASE_URL: http://client:3000
      API_URL: http://server:3001
      APP_SCHEMA_VERSION: ${APP_SCHEMA_VERSION:-dev}
    volumes:
      - ./e2e:/e2e
      - ./e2e-report:/e2e/playwright-report
    working_dir: /e2e
    # `npm install` (not ci) so we don't require a committed lockfile for this tiny
    # single-dep package. The Playwright image already ships Chromium + drivers.
    command: ["sh", "-c", "npm install --no-audit --no-fund && npx playwright test"]

services:
  sqld:
    image: ghcr.io/tursodatabase/libsql-server:latest
    environment:
      SQLD_NODE: primary
    volumes:
      - sqld-data:/var/lib/sqld

  server:
    build: ./server
    ports:
      - "3001:3001"
    depends_on:
      - sqld
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      TURSO_DATABASE_URL: libsql://sqld:8080?tls=0
      PORT: 3001
      NODE_ENV: development
    entrypoint: ["/app/entrypoint.sh"]

  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      API_TARGET: http://server:3001

volumes:
  sqld-data:

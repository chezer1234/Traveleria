services:
  server:
    build: ./server
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - /app/node_modules
      - server-data:/app/data
    environment:
      PORT: 3000
      NODE_ENV: development
    entrypoint: ["/app/entrypoint.sh"]

  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      API_TARGET: http://server:3000

volumes:
  server-data:

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Traveleria great circle route logo">
  <!-- Concept 05 · The Great Circle — distance scoring as the brand mark.
       A route arcs off the planet from your home pin to a points starburst:
       the further you fly, the bigger the burst. -->
  <rect width="512" height="512" rx="112" fill="#f6f1e7"/>
  <!-- the world -->
  <circle cx="232" cy="298" r="150" fill="#3e5f45"/>
  <g fill="none" stroke="#f6f1e7" stroke-width="5" opacity="0.45">
    <ellipse cx="232" cy="298" rx="66" ry="150"/>
    <line x1="82" y1="298" x2="382" y2="298"/>
    <path d="M94 228 A200 200 0 0 1 370 228"/>
    <path d="M94 368 A200 200 0 0 0 370 368"/>
  </g>
  <!-- home pin on the globe -->
  <g>
    <path d="M168 262 C143 262 130 281 130 297 C130 322 168 352 168 352 C168 352 206 322 206 297 C206 281 193 262 168 262 Z" fill="#c9a227" stroke="#f6f1e7" stroke-width="7"/>
    <circle cx="168" cy="296" r="13" fill="#f6f1e7"/>
  </g>
  <!-- dashed great-circle route -->
  <path d="M168 250 C180 130 300 92 378 132" fill="none" stroke="#c9a227" stroke-width="11" stroke-dasharray="1 24" stroke-linecap="round"/>
  <!-- points starburst at the destination -->
  <g transform="translate(396 142)">
    <polygon points="0,-62 7,-26.1 31,-53.7 19.1,-19.1 53.7,-31 26.1,-7 62,0 26.1,7 53.7,31 19.1,19.1 31,53.7 7,26.1 0,62 -7,26.1 -31,53.7 -19.1,19.1 -53.7,31 -26.1,7 -62,0 -26.1,-7 -53.7,-31 -19.1,-19.1 -31,-53.7 -7,-26.1" fill="#c9a227"/>
    <circle r="24" fill="#f6f1e7"/>
    <circle r="11" fill="#3e5f45"/>
  </g>
  <!-- tiny jet riding the route, nose along the tangent -->
  <g transform="translate(248 131) rotate(65) scale(1.35)">
    <path d="M0 -20 L7 2 L26 12 L26 20 L4 14 L2 26 L10 34 L10 40 L0 36 L-10 40 L-10 34 L-2 26 L-4 14 L-26 20 L-26 12 L-7 2 Z" fill="#2b2a26"/>
  </g>
</svg>
